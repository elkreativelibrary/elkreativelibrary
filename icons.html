<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hammer Trace Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      text-align: center;
      background: white;
      padding: 28px;
      border: 1px solid #ddd;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      max-width: 520px;
      width: 90%;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      color: #555;
      margin: 0 0 18px;
    }

    svg {
      width: 100%;
      max-width: 420px;
      height: auto;
      display: block;
      margin: 0 auto 18px;
      background: #fcfcfc;
      border: 1px solid #e5e5e5;
    }

    .hint-path {
      fill: none;
      stroke: #d9d9d9;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .user-line {
      fill: none;
      stroke: #111;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dot {
      fill: white;
      stroke: #111;
      stroke-width: 2;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .dot:hover {
      transform: scale(1.08);
    }

    .dot.done {
      fill: #111;
    }

    .hidden {
      display: none;
    }

    .pixel-wrap {
      display: none;
      justify-content: center;
      margin: 8px 0 18px;
    }

    .pixel-wrap.show {
      display: flex;
    }

    .pixel-grid {
      display: grid;
      grid-template-columns: repeat(10, 18px);
      grid-template-rows: repeat(10, 18px);
      gap: 2px;
    }

    .px {
      width: 18px;
      height: 18px;
      background: transparent;
    }

    .px.on {
      background: #111;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      font-size: 13px;
      color: #666;
      min-height: 18px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hammer Trace</h1>
    <p>Click the dots in order to trace the hammer shape.</p>

    <div class="status" id="status">Start from the first dot.</div>

    <svg id="traceArea" viewBox="0 0 400 300" aria-label="Hammer tracing game">
      <!-- soft guide -->
      <path
        class="hint-path"
        d="M110 90 L190 90 L190 125 L160 125 L160 215"
      ></path>

      <!-- user drawn line -->
      <polyline id="userLine" class="user-line" points=""></polyline>

      <!-- dots -->
      <circle class="dot" cx="110" cy="90" r="10" data-index="0"></circle>
      <circle class="dot" cx="190" cy="90" r="10" data-index="1"></circle>
      <circle class="dot" cx="190" cy="125" r="10" data-index="2"></circle>
      <circle class="dot" cx="160" cy="125" r="10" data-index="3"></circle>
      <circle class="dot" cx="160" cy="215" r="10" data-index="4"></circle>
    </svg>

    <div class="pixel-wrap" id="pixelWrap">
      <div class="pixel-grid" id="pixelGrid"></div>
    </div>

    <button id="resetBtn">Reset</button>
  </div>

  <script>
    const points = [
      { x: 110, y: 90 },
      { x: 190, y: 90 },
      { x: 190, y: 125 },
      { x: 160, y: 125 },
      { x: 160, y: 215 }
    ];

    const userLine = document.getElementById("userLine");
    const dots = document.querySelectorAll(".dot");
    const statusText = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");
    const traceArea = document.getElementById("traceArea");
    const pixelWrap = document.getElementById("pixelWrap");
    const pixelGrid = document.getElementById("pixelGrid");

    let currentStep = 0;
    let clickedPoints = [];

    function updateLine() {
      const pts = clickedPoints.map(p => `${p.x},${p.y}`).join(" ");
      userLine.setAttribute("points", pts);
    }

    function resetGame() {
      currentStep = 0;
      clickedPoints = [];
      updateLine();
      pixelWrap.classList.remove("show");
      traceArea.classList.remove("hidden");
      statusText.textContent = "Start from the first dot.";
      dots.forEach(dot => dot.classList.remove("done"));
    }

    function completeGame() {
      traceArea.classList.add("hidden");
      pixelWrap.classList.add("show");
      statusText.textContent = "Complete — traced shape became a pixel hammer.";
    }

    function createPixelHammer() {
      const pattern = [
        "0001111000",
        "0011111100",
        "0011111100",
        "0000110000",
        "0000110000",
        "0000110000",
        "0000110000",
        "0000110000",
        "0000110000",
        "0000110000"
      ];

      pixelGrid.innerHTML = "";

      pattern.forEach(row => {
        row.split("").forEach(cell => {
          const div = document.createElement("div");
          div.className = "px" + (cell === "1" ? " on" : "");
          pixelGrid.appendChild(div);
        });
      });
    }

    dots.forEach(dot => {
      dot.addEventListener("click", () => {
        const index = Number(dot.dataset.index);

        // forgiving rule:
        // allow the correct next dot
        // also allow being off by 1 step for demo forgiveness
        if (index === currentStep || index === currentStep + 1) {
          if (index > currentStep) {
            // auto-fill the missing step if user clicked one ahead
            const missedPoint = points[currentStep];
            clickedPoints.push(missedPoint);
            dots[currentStep].classList.add("done");
            currentStep++;
          }

          clickedPoints.push(points[index]);
          dot.classList.add("done");
          currentStep = index + 1;
          updateLine();

          if (currentStep >= points.length) {
            setTimeout(completeGame, 350);
          } else {
            statusText.textContent = `Good. Continue to dot ${currentStep + 1}.`;
          }
        } else {
          statusText.textContent = "Almost — follow the hammer shape in order.";
        }
      });
    });

    resetBtn.addEventListener("click", resetGame);

    createPixelHammer();
    resetGame();
  </script>
</body>
</html>
